server {
	listen 80;
	server_name _;

	root /usr/share/nginx/html;
	index index.html;

	location / {
		try_files $uri $uri/ /index.html;
	}

	location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|ico|webp|pdf)$ {
		try_files $uri =404;
		access_log off;
		expires 30d;
		add_header Cache-Control "public";
	}
}
